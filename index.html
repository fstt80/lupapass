
<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>

<style>

body {
  font-family: Calibri, Arial, sans-serif;
  background: radial-gradient(circle at top, #3b2a00, #120d02);
  padding: 20px;
  color: #fff;
  display: flex;
  justify-content: center;
}

@keyframes goldPulse {
  0% {
    box-shadow: 0 0 8px #ffd700, 0 0 20px #ffae00;
    border-color: #ffd700;
  }

  50% {
    box-shadow: 0 0 12px #fff3a1, 0 0 28px #ffcc00;
    border-color: #fff3a1;
  }

  100% {
    box-shadow: 0 0 8px #ffd700, 0 0 20px #ffae00;
    border-color: #ffd700;
  }
}

.container {
  width: 100%;
  max-width: 520px;
}

.logo {
  text-align: center;
  margin-bottom: 18px;
}

.logo img {
  width: 230px;
  max-width: 90%;
}

table {
  border-collapse: collapse;
  width: 100%;
  background: rgba(20,15,0,0.92);
  border-radius: 12px;
  border: 3px solid #ffd700;
  animation: goldPulse 2s infinite;
  overflow: hidden;
}

td {
  border: 1px solid rgba(255,255,255,0.12);
  padding: 12px;
  font-size: 14px;
}

td.label {
  width: 140px;
  font-weight: bold;
  color: #ffd700;
}

input,
select {
  width: 100%;
  border: none;
  outline: none;
  background: transparent;
  color: #fff;
  font-size: 14px;
}

select option {
  color: black;
}

#notif {
  margin-top: 14px;
  color: #ffd700;
  text-align: center;
  display: none;
  font-size: 14px;
}

.footer {
  margin-top: 12px;
  text-align: center;
  color: #999;
  font-size: 12px;
}

@media(max-width:600px){

  body {
    padding: 12px;
  }

  td {
    font-size: 13px;
    padding: 10px;
  }

  td.label {
    width: 110px;
  }

  .logo img {
    width: 190px;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="https://imgstore.io/images/2026/02/01/logo-utama.gif">
  </div>

<form id="form" autocomplete="off">

  <table>

    <tr>
      <td class="label">User ID</td>
      <td>
        <input
          id="userid"
          placeholder="Masukkan User ID"
          autocomplete="off"
          autofocus>
      </td>
    </tr>

    <tr>
      <td class="label">LOGIN SITE</td>
      <td>

        <select id="site">
          <option value="https://olxtre.com">🎯 olxtre.com 🔥</option>
        </select>

      </td>
    </tr>

  </table>

  <div id="notif">Copied Successfully ✅</div>

</form>

<div class="footer">
  BUAT SENDIRI BOSS !!<br>
  JANGAN MAIN CURI 😎
</div>

</div>

<script>

const WARNING_TEXT = "YANG PUNYA : OLXTT 🔥 SILAHKAN PAKAI BOS!";

// Popup logo
window.addEventListener("DOMContentLoaded", () => {

  const logoImage = document.querySelector(".logo img");

  if (logoImage) {
    logoImage.addEventListener("click", () => {
      alert(WARNING_TEXT);
    });
  }

});

// Gorilla fullscreen
function showGorilla() {

  if (document.getElementById("gorilla-full")) return;

  const div = document.createElement("div");

  div.id = "gorilla-full";

  div.style.position = "fixed";
  div.style.top = "0";
  div.style.left = "0";
  div.style.width = "100vw";
  div.style.height = "100vh";
  div.style.background = "black";
  div.style.zIndex = "999999999";
  div.style.display = "flex";
  div.style.justifyContent = "center";
  div.style.alignItems = "center";

  div.innerHTML = `
    <img 
      src="https://rlv.zcache.co.uk/gorilla_finger_square_sticker-r2da3e881de9f42d298c0eeecfca328f6_zg2qg7_644.webp?rlvnet=1"
      style="
        width:100vw;
        height:100vh;
        object-fit:contain;
      "
    >
  `;

  document.body.appendChild(div);
}

// Shortcut detect
document.addEventListener("keydown", e => {

  // CTRL + U
  if (e.ctrlKey && e.key.toLowerCase() === "u") {
    e.preventDefault();
    showGorilla();
  }

  // F12
  if (e.key === "F12") {
    e.preventDefault();
    showGorilla();
  }

});

const input = document.getElementById("userid");
const form = document.getElementById("form");
const notif = document.getElementById("notif");
const siteSelect = document.getElementById("site");

// Generate password
function generatePassword(length = 7) {

  const chars =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";

  let result = "";

  for (let i = 0; i < length; i++) {

    result += chars.charAt(
      Math.floor(Math.random() * chars.length)
    );

  }

  return result;
}

// Copy result
async function copyData() {

  const userId = input.value.trim();

  if (!userId) return;

  const password = generatePassword(7);
  const selectedSite = siteSelect.value;

  const text =
`User ID : ${userId}
Password : ${password}

🎯 ${selectedSite}

Bos Jangan lupa untuk mengganti Password Login bosku pada menu "Ganti Password" Sesuai dengan keinginan Bosku 🙏

⚠️ kami menyarankan USER ID & PASSWORD jangan sama ya bos ‼️`;

  await navigator.clipboard.writeText(text);

  notif.style.display = "block";

  setTimeout(() => {
    notif.style.display = "none";
  }, 1500);

  input.value = "";
  input.focus();
}

// ENTER auto copy
input.addEventListener("keydown", e => {

  if (e.key === "Enter") {

    e.preventDefault();
    copyData();

  }

});

// Submit backup
form.addEventListener("submit", e => {

  e.preventDefault();
  copyData();

});

</script>
